<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#120d07" />
    <meta
      name="description"
      content="Eagle Mart is a premium grocery ecommerce experience with fresh products, secure checkout, Razorpay test payments, saved carts, wishlist, and live order tracking."
    />
    <meta name="application-name" content="Eagle Mart" />
    <meta property="og:title" content="Eagle Mart | Premium Grocery Delivery" />
    <meta
      property="og:description"
      content="Shop fresh groceries, golden offers, secure checkout, and fast delivery from Eagle Mart."
    />
    <meta property="og:image" content="/eagle_logo.png" />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" href="/eagle_logo.png" />
    <link rel="apple-touch-icon" href="/eagle_logo.png" />
    <title>Eagle Mart | Premium Grocery Delivery</title>
  </head>
  <body>
    <div id="root">
      <style>
        body {
          margin: 0;
          background:
            radial-gradient(circle at 20% 18%, rgba(214, 172, 61, 0.18), transparent 26%),
            radial-gradient(circle at 82% 24%, rgba(18, 14, 10, 0.12), transparent 24%),
            linear-gradient(135deg, #fffaf2 0%, #fff1df 45%, #f6e6cf 100%);
          font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .boot-fallback {
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 24px;
          box-sizing: border-box;
          color: #241f1b;
          overflow: hidden;
          position: relative;
        }
        .boot-fallback::selection {
          background: rgba(201, 151, 43, 0.24);
        }
        .boot-fallback::before,
        .boot-fallback::after {
          content: "";
          position: absolute;
          border-radius: 999px;
          border: 22px solid rgba(177, 128, 28, 0.12);
          filter: blur(1px);
          animation: boot-float 5.4s ease-in-out infinite;
        }
        .boot-fallback::before {
          width: 160px;
          height: 160px;
          left: 10%;
          top: 13%;
        }
        .boot-fallback::after {
          width: 220px;
          height: 220px;
          right: -42px;
          bottom: 8%;
          animation-delay: -2s;
        }
        .boot-card {
          position: relative;
          width: min(560px, 100%);
          padding: 38px 34px 34px;
          border-radius: 34px;
          background:
            radial-gradient(circle at 50% -12%, rgba(245, 207, 99, 0.22), transparent 42%),
            linear-gradient(145deg, rgba(255, 250, 241, 0.9), rgba(255, 236, 207, 0.76));
          border: 1px solid rgba(255, 255, 255, 0.76);
          box-shadow: 0 30px 95px rgba(51, 34, 15, 0.2);
          text-align: center;
          backdrop-filter: blur(20px);
          overflow: hidden;
        }
        .boot-card::before {
          content: "";
          position: absolute;
          inset: -45% -20% auto;
          height: 150px;
          background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.62), transparent);
          transform: rotate(-12deg);
          animation: boot-shine 2.8s ease-in-out infinite;
        }
        .boot-mark {
          position: relative;
          display: inline-grid;
          place-items: center;
          width: 150px;
          height: 118px;
          border-radius: 30px;
          background:
            radial-gradient(circle at 50% 36%, rgba(255, 227, 131, 0.34), transparent 52%),
            linear-gradient(145deg, rgba(20, 15, 10, 0.94), rgba(144, 99, 22, 0.84));
          box-shadow:
            0 24px 54px rgba(106, 72, 20, 0.22),
            inset 0 1px 0 rgba(255, 255, 255, 0.24);
          margin-bottom: 22px;
          animation: boot-pop 1.1s ease both, boot-breathe 2.8s ease-in-out infinite 1s;
        }
        .boot-mark::before {
          content: "";
          position: absolute;
          inset: -10px;
          border-radius: 36px;
          border: 1px solid rgba(214, 172, 61, 0.38);
          animation: boot-ring 2.4s ease-in-out infinite;
        }
        .boot-mark img {
          position: relative;
          width: 126px;
          height: 92px;
          object-fit: contain;
          filter: drop-shadow(0 14px 18px rgba(0, 0, 0, 0.34));
        }
        .boot-card h1 {
          position: relative;
          margin: 0;
          font-size: clamp(2rem, 5vw, 3.3rem);
          letter-spacing: 0;
          line-height: 1;
        }
        .boot-card p {
          position: relative;
          margin: 14px auto 22px;
          max-width: 410px;
          color: #6f604e;
          font-size: 1.02rem;
          line-height: 1.55;
        }
        .boot-loader {
          position: relative;
          display: grid;
          gap: 16px;
        }
        .boot-track {
          height: 10px;
          border-radius: 999px;
          background: rgba(36, 31, 27, 0.1);
          overflow: hidden;
          box-shadow: inset 0 1px 2px rgba(36, 31, 27, 0.12);
        }
        .boot-track span {
          display: block;
          width: 42%;
          height: 100%;
          border-radius: inherit;
          background: linear-gradient(90deg, #15100b, #c8942f, #f4d36d);
          animation: boot-load 1.35s ease-in-out infinite;
        }
        .boot-chips {
          display: flex;
          justify-content: center;
          gap: 10px;
          flex-wrap: wrap;
        }
        .boot-chips span {
          padding: 8px 12px;
          border-radius: 999px;
          background: rgba(255, 255, 255, 0.58);
          border: 1px solid rgba(112, 76, 32, 0.12);
          color: #8d661e;
          font-size: 0.82rem;
          font-weight: 800;
          animation: boot-chip 1.8s ease-in-out infinite;
        }
        .boot-chips span:nth-child(2) {
          animation-delay: 0.18s;
        }
        .boot-chips span:nth-child(3) {
          animation-delay: 0.36s;
        }
        .boot-dots {
          display: flex;
          justify-content: center;
          gap: 8px;
          margin-top: 2px;
        }
        .boot-dots i {
          width: 8px;
          height: 8px;
          border-radius: 999px;
          background: linear-gradient(135deg, #17110a, #c8942f);
          animation: boot-dot 1.1s ease-in-out infinite;
        }
        .boot-dots i:nth-child(2) {
          animation-delay: 0.16s;
        }
        .boot-dots i:nth-child(3) {
          animation-delay: 0.32s;
        }
        @keyframes boot-load {
          0% { transform: translateX(-110%); }
          55% { transform: translateX(85%); }
          100% { transform: translateX(250%); }
        }
        @keyframes boot-float {
          0%, 100% { transform: translate3d(0, 0, 0) rotate(0deg); }
          50% { transform: translate3d(16px, -18px, 0) rotate(16deg); }
        }
        @keyframes boot-shine {
          0% { transform: translateX(-120%) rotate(-12deg); opacity: 0; }
          35% { opacity: 1; }
          80%, 100% { transform: translateX(145%) rotate(-12deg); opacity: 0; }
        }
        @keyframes boot-pop {
          0% { transform: translateY(10px) scale(0.92); opacity: 0; }
          100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes boot-chip {
          0%, 100% { transform: translateY(0); opacity: 0.76; }
          50% { transform: translateY(-4px); opacity: 1; }
        }
        @keyframes boot-ring {
          0%, 100% { transform: scale(0.96); opacity: 0.44; }
          50% { transform: scale(1.04); opacity: 0.9; }
        }
        @keyframes boot-breathe {
          0%, 100% { transform: translateY(0) scale(1); }
          50% { transform: translateY(-5px) scale(1.02); }
        }
        @keyframes boot-dot {
          0%, 100% { transform: translateY(0) scale(0.82); opacity: 0.45; }
          50% { transform: translateY(-5px) scale(1.08); opacity: 1; }
        }
        @media (max-width: 560px) {
          .boot-card {
            padding: 28px 20px;
            border-radius: 28px;
          }
          .boot-mark {
            width: 132px;
            height: 104px;
          }
          .boot-mark img {
            width: 112px;
            height: 82px;
          }
        }
      </style>
      <div class="boot-fallback">
        <div class="boot-card">
          <div class="boot-mark"><img src="/eagle_logo.png" alt="Eagle Mart" /></div>
          <h1>Eagle Mart</h1>
          <p id="boot-message">Preparing your premium grocery experience...</p>
          <div class="boot-loader" aria-label="Loading">
            <div class="boot-track"><span></span></div>
            <div class="boot-dots" aria-hidden="true"><i></i><i></i><i></i></div>
            <div class="boot-chips">
              <span>Fresh picks</span>
              <span>Golden offers</span>
              <span>Fast checkout</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      if (window.location.protocol === 'file:') {
        document.getElementById('boot-message').innerHTML =
          'This React app must be opened through the local Vite server.<br />Double-click START-FRESHMART.bat in this folder, or run npm run dev and open http://127.0.0.1:5173';
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
